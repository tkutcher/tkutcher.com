
# Using work buildtools (with CTO approval 😬) to get az-storage-replace-dir
image: registry.gitlab.com/dicorp/v2/techsec/anvilor/buildtools/py3.13-node22:latest

stages:
  - deploy

deploy:
  stage: deploy
  image: mcr.microsoft.com/azure-cli
  script:
    - PATH=$PATH:/usr/local/bin
    - az-storage-replace-dir -n tkutchercomdevwa01 -k $AZURE_STORAGE_ACCOUNT_KEY -s src -d "" -c "$web"
  only:
    - main

